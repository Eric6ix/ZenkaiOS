# ====== Aparência básica ======
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.5

# ====== Cores e transparência ======
background       #0d0d0d
foreground       #cfcfcf
background_opacity 0.40

# ====== Layout ======
window_padding_width  20

# ====== Bordas ======
active_border_color   #ffffff
inactive_border_color #1a1a1a

# ====== Cursor ======
cursor_shape block
cursor_blink_interval 0.5
cursor #5eff00
cursor_trail 1
